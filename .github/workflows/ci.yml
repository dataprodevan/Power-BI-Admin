name: CI

on:
  push:
  pull_request:

jobs:
  pwsh-parse:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $files = Get-ChildItem -Recurse -Include *.ps1, *.psm1, *.psd1
          if (-not $files) { throw "No PowerShell files found (*.ps1/*.psm1/*.psd1)" }

          foreach ($f in $files) {
            Write-Host "Parsing $($f.FullName)"
            [void][System.Management.Automation.Language.Parser]::ParseFile($f.FullName, [ref]$null, [ref]$null)
          }
