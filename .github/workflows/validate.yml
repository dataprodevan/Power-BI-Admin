name: Validate PowerShell

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse PowerShell files
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $files = Get-ChildItem -Recurse -Include *.ps1, *.psm1, *.psd1
          if (-not $files) { throw "No PowerShell files found." }
          foreach ($f in $files) {
            [void][System.Management.Automation.Language.Parser]::ParseFile($f.FullName, [ref]$null, [ref]$null)
          }
